<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#1a1a2e"/>
  <!-- Main trunk line -->
  <line x1="4" y1="16" x2="14" y2="16" stroke="#d4a84b" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Split node -->
  <circle cx="14" cy="16" r="3" fill="#d4a84b"/>
  <!-- Child branch (up) -->
  <path d="M14 16 Q18 16 22 8" fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
  <circle cx="22" cy="8" r="2" fill="#4ade80"/>
  <!-- Adult branch (straight) -->
  <line x1="14" y1="16" x2="26" y2="16" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <circle cx="26" cy="16" r="2" fill="#60a5fa"/>
  <!-- Fallen branch (down) -->
  <path d="M14 16 Q18 16 22 24" fill="none" stroke="#c084fc" stroke-width="2" stroke-linecap="round"/>
  <circle cx="22" cy="24" r="2" fill="#c084fc"/>
</svg>
